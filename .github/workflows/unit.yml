name: Unit Tests

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    name: Typecheck + Vitest
    timeout-minutes: 10
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dazai-kirpejams

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dazai-kirpejams/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
